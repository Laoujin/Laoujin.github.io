<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Laoujin</title>
    <style>
      :root { font-family: system-ui, sans-serif; color-scheme: light dark; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center;
             background: #0f172a; color: #e2e8f0; }
      main { width: min(640px, 90vw); padding: 2rem; }
      h1 { font-weight: 600; letter-spacing: -0.02em; }
      .cards { display: grid; gap: 1rem; margin-top: 1.5rem; }
      .card { display: block; padding: 1.25rem 1.5rem; border-radius: 12px;
              background: #1e293b; color: inherit; text-decoration: none;
              border: 1px solid #334155; transition: border-color .15s, transform .15s; }
      .card:hover { border-color: #64748b; transform: translateY(-2px); }
      .card h3 { margin: 0 0 .25rem; }
      .card p { margin: 0; color: #94a3b8; font-size: .95rem; }
    </style>
  </head>
  <body>
    <main>
      <h1>Laoujin</h1>
      <div class="cards">
        <a class="card" href="/homelab/">
          <h3>Homelab →</h3>
          <p>Network topology &amp; device catalog</p>
        </a>
      </div>
    </main>
  </body>
</html>
